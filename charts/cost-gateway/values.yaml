replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

serviceMonitorEnabled: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

resources:
  requests:
    cpu: 300m
    memory: 300Mi
  limits:
    cpu: 300m
    memory: 300Mi


service:
  type: ClusterIP

  metrics:
    port: 8080

livenessProbe:
  failureThreshold: 3
  httpGet:
    path: /
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5

# Cost Gateway settings
settings:

  # Prometheus metric exposure configuration
  prometheus:

    # -- KG exporter '/metrics' API port
    endpoint_port: 8080

  # Cost monitoring configuration
  cost:

    # -- Enable cost monitoring
    enabled: false

    # -- Cost sources to monitor
    sources: {}

    # Example cost sources (uncomment and configure for production use)
    #
    # sources:
    #   energy:
    #     min_cost: 0.1
    #     max_cost: 0.5
    #     peak_time: 43200
    #     period: 86400
    #   cloud:
    #     min_cost: 100.0
    #     max_cost: 500.0
    #     peak_time: 21600
    #     period: 86400
