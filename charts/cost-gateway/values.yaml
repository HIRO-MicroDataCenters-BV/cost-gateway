replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

serviceMonitorEnabled: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

resources:
  requests:
    cpu: 300m
    memory: 300Mi
  limits:
    cpu: 300m
    memory: 300Mi


service:
  type: ClusterIP

  metrics:
    port: 8080

livenessProbe:
  failureThreshold: 3
  httpGet:
    path: /
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5

# Cost Gateway settings
settings:

  # Prometheus metric exposure configuration
  prometheus:

    # -- KG exporter '/metrics' API port
    endpoint_port: 8080

  # Cost monitoring configuration
  cost:

    # -- Enable cost monitoring to expose costs to Prometheus
    enabled: true

    # -- Cost sources to monitor with sinusoidal simulation
    sources:
      # Energy cost simulator
      energy:
        # Minimum energy cost
        min_cost: 0.1
        # Maximum energy cost
        max_cost: 0.5
        # Unix timestamp when cost peaks (12:00 UTC)
        peak_time: 43200
        # Cost cycle period in seconds (default: 86400 = 24 hours)
        period: 86400

      # Cloud cost simulator
      cloud:
        # Minimum cloud cost
        min_cost: 100.0
        # Maximum cloud cost
        max_cost: 500.0
        # Unix timestamp when cost peaks (06:00 UTC)
        peak_time: 21600
        # Cost cycle period in seconds (default: 86400 = 24 hours)
        period: 86400
