prometheus:
  endpoint_port: 8080
api:
  port: 8085
cost:
  enabled: true
  sources:
    energy:
      strategy: sinusoidal
      min_cost: 0.1
      max_cost: 0.5
      peak_time: 43200
      period: 86400
    cloud:
      strategy: sinusoidal
      min_cost: 100.0
      max_cost: 500.0
      peak_time: 21600
      period: 86400
