replicaCount: 1

image:
  repository: "ghcr.io/hiro-microdatacenters-bv/cost-gateway-dev"
  tag: "test1"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

service:
  type: LoadBalancer
  port: 8000

# Cost Gateway
settings:

  # Prometheus metric exposure configuration
  prometheus:

    # -- KG exporter '/metrics' API port
    endpoint_port: 8085

  # Cost monitoring configuration
  cost:

    # -- Enable cost monitoring
    enabled: true

    # -- Cost sources to monitor
    sources:
      energy:
        min_cost: 0.1
        max_cost: 0.5
        peak_time: 43200
      cloud:
        min_cost: 100.0
        max_cost: 500.0
        peak_time: 21600
